<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Galaxy Data Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading">
    <div class="loading-card">
      <div class="loading-title">🩵Ha Vi ❤️</div>
      <div class="loading-sub">Galaxy Synthesis...</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div id="container"></div>

  <div id="topBar">
    <div id="topTitle">NGC 5194 <span>· Whirlpool Galaxy</span></div>
    <div id="topRight">
      <button id="musicToggle">🔊</button>
    </div>
  </div>

  <!-- Data tooltip for interactive clusters -->
  <div id="tooltip"></div>

  <audio id="bgAudio" src="tim-em.m4a" loop preload="auto"></audio>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
